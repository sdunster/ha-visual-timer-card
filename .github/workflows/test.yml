name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Upgrade npm
        run: npm install -g npm@11
      - name: Install deps
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Verify build
        run: npm run build
      - name: Check build artifact exists
        run: test -f dist/ha-visual-timer-card.js
