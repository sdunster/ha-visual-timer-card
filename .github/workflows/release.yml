name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Enable corepack
        run: corepack enable
      - name: Install deps
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Verify artifact exists
        run: test -f dist/ha-visual-timer-card.js
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ha-visual-timer-card.js
          generate_release_notes: true
          draft: false
          prerelease: false
